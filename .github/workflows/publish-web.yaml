name: Publish Web
on:
  workflow_dispatch:
    inputs:
      script:
        description: "Select the script to execute"
        required: true
        type: choice
        options:
          - push-new-version
          - overwrite-latest-version
          - overwrite-past-version
      version:
        description: "Version to publish"
        required: true
        type: string
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - name: Install safe-chain
        uses: OpenVidu/actions/install-safe-chain@1eb0c5759951f915de29647dedfa1ec8fbb5eeac # v1.0.20

      - name: Install dependencies
        run: |
          sudo apt-get update
          pip install mike "mkdocs-material[imaging]==9.7.1" mkdocs-glightbox mkdocs-llmstxt
          sudo apt-get install --fix-missing libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev
          sudo apt-get install -y --fix-missing pngquant

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Run selected script
        working-directory: ./custom-versioning
        env:
          GOOGLE_ANALYTICS_KEY: ${{ secrets.GOOGLE_ANALYTICS_KEY }}
        run: |
          ./${{ github.event.inputs.script }}.sh ${{ github.event.inputs.version }}
