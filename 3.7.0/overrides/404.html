{% extends "main.html" %}

<!-- Content -->
{% block content %}
  <h1>404 - Not found</h1>
  <script>
    // Get the current URL
    const path = window.location.pathname;

    // Versioned sections that must redirect to their latest version.
    // Keep this list in sync with VERSIONED_PAGES in custom-versioning/push-new-version.sh
    const versionedPages = ['docs', 'meet'];

    // If the URL points to a versioned section without a version prefix,
    // redirect to "/latest/<section>/" preserving the rest of the path
    for (const page of versionedPages) {
        const prefix = '/' + page + '/';
        if (path.startsWith(prefix)) {
            const newPath = path.replace(prefix, '/latest' + prefix);
            window.location.replace(newPath);
            break;
        }
    }
  </script>
{% endblock %}
